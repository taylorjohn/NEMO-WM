# CORTEX-Perception-Engine — Heart Sound Anomaly Detection Config
#
# Dataset: CirCor DigiScope Phonocardiogram Dataset (PhysioNet 2022 Challenge)
#   5,282 PCG recordings from 1,568 patients (0.1–356 months, rural Brazil)
#   Labels: Murmur Present / Absent / Unknown
#   Download: https://physionet.org/content/circor-heart-sound/1.0.3/
#
# Task: Zero-label heart murmur detection
#   Train on Normal (Murmur Absent) PCG recordings only
#   Anomaly score = negative L2 norm of latent vector (same as bearing)
#   Evaluate AUROC on Murmur Present vs Absent
#
# Clinical significance:
#   Murmurs indicate turbulent blood flow — valve disease, septal defects,
#   coronary artery disease. Early detection enables referral for
#   echocardiogram. Edge deployment enables screening in rural/resource-
#   constrained settings (dataset was collected in rural Brazil).
#
# Run full pipeline:
#   python run_experiment.py --config configs/heart_sound.yaml
#
# Run step by step:
#   python collect_heart_frames.py --download --download-dir ./heart_data
#   python collect_heart_frames.py --split normal --data-dir ./heart_data/training_data --out ./heart_data/normal_cls/normal --max-frames 2000
#   python collect_heart_frames.py --split all    --data-dir ./heart_data/training_data --out ./heart_data/all_frames --max-frames 5000
#   python run_experiment.py --config configs/heart_sound.yaml --stages encoder,predictor
#   python collect_heart_frames.py --evaluate --weights ./checkpoints/heart/cortex_student_phase2_final.pt --out ./heart_data/all_frames

experiment:
  name: "heart_murmur_circor"
  description: >
    Zero-label heart murmur detection via self-supervised world model.
    Train on normal PCG mel-spectrograms only (no murmur labels).
    Anomaly score = negative L2 norm of latent vector.
    Evaluate AUROC on CirCor DigiScope 2022 Challenge dataset.
    Clinical application: point-of-care screening in resource-constrained settings.
  tags:
    - heart_sound
    - phonocardiogram
    - murmur_detection
    - zero_label
    - medical
    - edge_NPU
    - CirCor
    - PhysioNet2022

encoder:
  checkpoint:  null    # train from scratch on PCG spectrograms
  onnx_model:  "./npu_models/cortex_student_fp32.onnx"
  spatial_dv:  8       # optimal per Wang et al. B.4
  n_patches:   196     # 14×14 grid

training:
  phase1:
    # Normal PCG mel-spectrograms — ImageFolder structure
    # Generated by: collect_heart_frames.py --split normal --out ./heart_data/normal_cls/normal
    # Then wrapped: mkdir ./heart_data/normal_cls/normal && mv frames there
    data:          "./heart_data/normal_cls"
    steps:         8000
    batch_size:    32
    lr:            1.0e-3
    lambda_sigreg: 5.0

  phase2:
    # Sequential normal PCG frames (same patient, consecutive windows)
    # Generated by: collect_heart_frames.py --split normal --out ./heart_data/normal_seq
    data:          "./heart_data/normal_seq"
    steps:         6000
    batch_size:    16
    lr:            3.0e-4
    lambda_sigreg: 5.0
    lambda_curv:   0.1
    curv_variant:  "agg"

predictor:
  option:     3         # SpatialMLP
  frameskip:  3         # 3-window hop = 3 seconds between frames
  min_dist:   0.1
  epochs:     20
  batch_size: 32
  lr:         5.0e-4

# =============================================================================
# Evaluation
# =============================================================================
evaluation:
  # Primary metric: AUROC (normal=0 vs murmur=1)
  # Secondary: per-location AUROC (PV, TV, AV, MV)
  # Tertiary: per-murmur-grade AUROC (early, late, holosystolic)
  anomaly_score: "negative_L2_norm"
  command: >
    python collect_heart_frames.py
    --evaluate
    --weights ./checkpoints/heart/cortex_student_phase2_final.pt
    --out ./heart_data/all_frames

# =============================================================================
# Reference baselines
# =============================================================================
reference:
  physionet_challenge_2022:
    best_murmur_auroc:   0.86
    method:              "Supervised ensemble (2022 Challenge winner)"
    labels_required:     true

  random_forest_baseline:
    murmur_auroc:        0.74
    method:              "Random forest on RMS/kurtosis features"
    labels_required:     true

  cortex_pe_target:
    murmur_auroc:        0.75   # conservative — domain transfer from bearing
    method:              "Self-supervised world model (no murmur labels)"
    labels_required:     false
    inference_ms:        0.34   # AMD Ryzen AI NPU

# =============================================================================
# Signal processing details
# =============================================================================
signal:
  sampling_rate:   4000    # Hz (CirCor native)
  window_sec:      2.0     # seconds per frame
  hop_sec:         1.0     # 50% overlap
  n_mels:          128     # mel filterbank bands
  n_fft:           512
  hop_length:      128     # STFT hop for mel

  # Three-channel rendering:
  #   R = full mel spectrogram (all frequency content)
  #   G = harmonic component  (S1/S2 heart sounds — periodic)
  #   B = percussive component (murmur noise — broadband transient)
  channels:
    R: "mel_full"
    G: "harmonic_median_filtered"
    B: "percussive_median_filtered"

# =============================================================================
# Clinical context
# =============================================================================
clinical:
  target_condition: "heart murmur"
  clinical_significance: >
    Murmurs are abnormal sounds caused by turbulent blood flow,
    associated with valve disease, septal defects, and coronary artery
    disease. Early detection enables referral for echocardiogram.
  population: "Pediatric (0.1–356 months), rural Brazil"
  auscultation_locations:
    PV: "Pulmonary valve area"
    TV: "Tricuspid valve area"
    AV: "Aortic valve area"
    MV: "Mitral valve area"
  n_patients: 1568
  n_recordings: 5282
  murmur_prevalence: 0.37    # 37% of patients have murmur present

# =============================================================================
# NPU deployment
# =============================================================================
npu:
  model:          "./npu_models/cortex_student_xint8.onnx"
  provider:       "VitisAI"
  conda_env:      "ryzen-ai-1.7.0"
  latency_ms:     0.34
  # Clinical application: digital stethoscope with embedded Ryzen AI module
  # 0.34ms inference → real-time feedback during auscultation
  # 2941 frames/second → simultaneous monitoring of all 4 locations

# =============================================================================
# Data paths
# =============================================================================
data:
  raw:         "./heart_data/training_data"
  normal_cls:  "./heart_data/normal_cls"    # ImageFolder for Phase 1
  normal_seq:  "./heart_data/normal_seq"    # sequential for Phase 2
  all_frames:  "./heart_data/all_frames"    # all patients for evaluation

  download_command: >
    wget -r -N -c -np
    https://physionet.org/files/circor-heart-sound/1.0.3/training_data/
    -P ./heart_data/
